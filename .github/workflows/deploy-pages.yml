# Builds the static Next.js site and publishes it to GitHub Pages.
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Node in two places:
# - setup-node below: version used to run `npm ci` / `npm run build` (your app).
# - `upload-pages-artifact` embeds `upload-artifact` v4.6.2 (Node 20). Upstream fix is tracked in:
#   https://github.com/actions/upload-pages-artifact/pull/139
#   https://github.com/actions/upload-pages-artifact/issues/138
#   When a release notes “Node 24” / bumps embedded upload-artifact: try removing
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 below and re-run the workflow to confirm warnings are gone.
#   Deprecation context: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      # Must match next.config.js: distDir is `build`, so the static export is here.
      # (Next’s default without distDir is `out/` — templates often use path: out; that causes
      # "tar: out: Cannot open: No such file or directory" for this repo.)
      - name: Verify static export output
        run: test -f build/index.html || (echo "::error::build/index.html missing — check next build and distDir" && exit 1)

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
